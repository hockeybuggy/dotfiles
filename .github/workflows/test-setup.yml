name: Test setup.sh

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify tools in a clean Debian container
        run: ./test/run.sh

  test-macos:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify macOS tools
        run: |
          export TERM=xterm
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          ./test/setup-script-name.sh
          ./setup.sh
          ./bootstrap.sh
          ./test/verify.sh
