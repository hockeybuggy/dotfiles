name: Test setup.sh

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify the environment in a clean Debian container
        run: ./test/run.sh

  test-macos:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify macOS tools
        run: |
          export TERM=xterm
          ./test/setup-script-name.sh
          ./setup.sh
          ./bootstrap.sh
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.local/share/fnm:$PATH"
          export EDITOR=nvim
          ./test/verify.sh
          ./doctor.sh --ci
